# ============================================================
# Nginx Configuration — VPS DevOps Agent
# ============================================================
# PRODUCTION: Reverse proxy HTTPS avec SSL/TLS Let's Encrypt
# WebSocket support pour le terminal SSH
# Rate limiting, headers de sécurité, compression
# ============================================================
#
# INSTALLATION:
#   sudo cp deploy/nginx/vps-devops-agent.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/vps-devops-agent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# REMPLACER: YOUR_DOMAIN par votre domaine réel (ex: admin.monvps.fr)
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

# Upstream backend
upstream vps_agent_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ============================================================
    # SSL/TLS Configuration (Let's Encrypt)
    # ============================================================
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # Security Headers
    # ============================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ============================================================
    # General Settings
    # ============================================================
    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ============================================================
    # WebSocket — Terminal SSH (/api/terminal/ws)
    # ============================================================
    location /api/terminal/ws {
        limit_req zone=ws_limit burst=20 nodelay;

        proxy_pass http://vps_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (10 minutes)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ============================================================
    # API Auth — Rate limiting strict (anti brute-force)
    # ============================================================
    location /api/auth/login {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://vps_agent_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # API Routes — Rate limiting modéré
    # ============================================================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://vps_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts API (5 minutes pour commandes longues)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ============================================================
    # Frontend Static Files
    # ============================================================
    location / {
        proxy_pass http://vps_agent_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://vps_agent_backend;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # ============================================================
    # Block sensitive paths
    # ============================================================
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location = /api-docs {
        # Swagger docs — restrict to localhost/admin in production
        # Uncomment to restrict: allow 127.0.0.1; deny all;
        proxy_pass http://vps_agent_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Access logs
    access_log /var/log/nginx/vps-devops-agent.access.log;
    error_log /var/log/nginx/vps-devops-agent.error.log warn;
}
